<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケバトルアシスト</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4db8e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ポケバト">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- データ・コアライブラリ -->
  <script src="js/data.js"></script>
  <script src="js/kana.js"></script>
  <script src="js/store.js"></script>
  <script src="js/search.js"></script>
  <script src="js/score.js"></script>

  <!-- Firebase -->
  <script src="js/firebase.js"></script>

  <!-- コンポーネント -->
  <script src="js/pokemon-input.js"></script>
  <script src="js/router.js"></script>

  <!-- ビュー -->
  <script src="js/views/home.js"></script>
  <script src="js/views/type-list.js"></script>
  <script src="js/views/type-edit.js"></script>
  <script src="js/views/party-list.js"></script>
  <script src="js/views/party-edit.js"></script>
  <script src="js/views/simulator.js"></script>
  <script src="js/views/settings.js"></script>

  <!-- エントリポイント -->
  <script src="js/app.js"></script>

  <!-- Service Worker 登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.warn('SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
